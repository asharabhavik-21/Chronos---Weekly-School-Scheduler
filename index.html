<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronos - Premium School Timetable</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Premium Header -->
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1.5"></path><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 10h18"></path></svg>
        </div>
        <div class="logo-text">
          <h1>Chronos</h1>
          <span>Weekly School Scheduler</span>
        </div>
      </div>

      <!-- Action Panel -->
      <div class="action-panel">
        <!-- Timetable Select/Profile -->
        <div class="profile-selector-container">
          <select id="profile-select" class="premium-select" aria-label="Select Class Profile">
            <!-- Dynamically populated or default options -->
            <option value="default">Grade 10 - Science</option>
          </select>
          <button id="add-profile-btn" class="icon-btn tooltip" data-tooltip="New Profile" aria-label="Add New Profile">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
          <button id="delete-profile-btn" class="icon-btn tooltip danger-btn" data-tooltip="Delete Profile" aria-label="Delete Current Profile">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          </button>
        </div>

        <div class="settings-group">
          <!-- Week view toggle -->
          <div class="toggle-container">
            <span class="toggle-label">Mon-Sat</span>
            <label class="switch">
              <input type="checkbox" id="saturday-toggle" checked>
              <span class="slider round"></span>
            </label>
          </div>

          <!-- Divider -->
          <div class="v-divider"></div>

          <!-- Utility buttons -->
          <button id="demo-btn" class="btn btn-secondary btn-icon tooltip" data-tooltip="Load Premium Demo Template">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
            <span>Demo Data</span>
          </button>
          
          <button id="print-btn" class="btn btn-primary btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            <span>Print / PDF</span>
          </button>

          <!-- Light/Dark Toggle -->
          <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark/light theme">
            <!-- Sun Icon (visible in Dark Mode) -->
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
            <!-- Moon Icon (visible in Light Mode) -->
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Timetable Workspace -->
    <main class="workspace-main">
      <div class="card timetable-card">
        <div class="timetable-scroller">
          <!-- Timetable Dynamic Grid -->
          <div id="timetable-grid" class="timetable-grid show-saturday">
            <!-- Time / Days Header Column / Rows populated dynamically via JS -->
          </div>
        </div>
      </div>
    </main>

    <!-- App Footer / Guide -->
    <footer class="app-footer">
      <p>💡 Tip: Click on any slot to add or update lecture details. Create multiple profile schedules using the dropdown menu!</p>
    </footer>
  </div>

  <!-- Custom Edit Slot Modal (dialog element) -->
  <dialog id="slot-modal" class="premium-dialog">
    <div class="dialog-content">
      <div class="dialog-header">
        <div class="header-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
          <h2 id="modal-title">Edit Lecture</h2>
        </div>
        <button id="modal-close" class="close-btn" aria-label="Close modal">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <form id="slot-form" method="dialog">
        <input type="hidden" id="slot-day" value="">
        <input type="hidden" id="slot-index" value="">

        <div class="input-grid">
          <div class="input-group">
            <label for="input-subject">Subject *</label>
            <input type="text" id="input-subject" placeholder="e.g., Mathematics, Physics" required autocomplete="off">
          </div>

          <div class="input-group">
            <label for="input-teacher">Teacher</label>
            <input type="text" id="input-teacher" placeholder="e.g., Prof. Davis" autocomplete="off">
          </div>

          <div class="input-group">
            <label for="input-room">Room / Lab</label>
            <input type="text" id="input-room" placeholder="e.g., Room 102, Lab A" autocomplete="off">
          </div>

          <div class="input-group">
            <label>Color Theme</label>
            <div class="color-picker-grid">
              <!-- Colors populated dynamically or statically styled -->
              <label class="color-swatch-wrapper">
                <input type="radio" name="slot-color" value="accent-blue" checked>
                <span class="color-swatch bg-accent-blue" title="Blue"></span>
              </label>
              <label class="color-swatch-wrapper">
                <input type="radio" name="slot-color" value="accent-green">
                <span class="color-swatch bg-accent-green" title="Green"></span>
              </label>
              <label class="color-swatch-wrapper">
                <input type="radio" name="slot-color" value="accent-purple">
                <span class="color-swatch bg-accent-purple" title="Purple"></span>
              </label>
              <label class="color-swatch-wrapper">
                <input type="radio" name="slot-color" value="accent-orange">
                <span class="color-swatch bg-accent-orange" title="Orange"></span>
              </label>
              <label class="color-swatch-wrapper">
                <input type="radio" name="slot-color" value="accent-pink">
                <span class="color-swatch bg-accent-pink" title="Pink"></span>
              </label>
              <label class="color-swatch-wrapper">
                <input type="radio" name="slot-color" value="accent-teal">
                <span class="color-swatch bg-accent-teal" title="Teal"></span>
              </label>
              <label class="color-swatch-wrapper">
                <input type="radio" name="slot-color" value="accent-indigo">
                <span class="color-swatch bg-accent-indigo" title="Indigo"></span>
              </label>
              <label class="color-swatch-wrapper">
                <input type="radio" name="slot-color" value="accent-rose">
                <span class="color-swatch bg-accent-rose" title="Rose"></span>
              </label>
            </div>
          </div>
        </div>

        <div class="dialog-actions">
          <button type="button" id="delete-slot-btn" class="btn btn-danger btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            <span>Clear Slot</span>
          </button>
          
          <div class="right-actions">
            <button type="button" id="cancel-modal-btn" class="btn btn-secondary">Cancel</button>
            <button type="submit" id="save-slot-btn" class="btn btn-primary">Save Changes</button>
          </div>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Add Profile Dialog -->
  <dialog id="profile-modal" class="premium-dialog mini-dialog">
    <div class="dialog-content">
      <div class="dialog-header">
        <div class="header-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          <h2>New Timetable</h2>
        </div>
        <button id="profile-modal-close" class="close-btn" aria-label="Close modal">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="profile-form" method="dialog">
        <div class="input-group">
          <label for="input-profile-name">Class / Profile Name *</label>
          <input type="text" id="input-profile-name" placeholder="e.g., Grade 11 - Commerce" required autocomplete="off">
        </div>
        <div class="dialog-actions justify-end">
          <button type="button" id="cancel-profile-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Profile</button>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- JavaScript file -->
  <script src="app.js"></script>
</body>
</html>
